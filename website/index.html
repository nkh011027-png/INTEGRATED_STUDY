<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Hong Kong Traffic Forecast Map</title>
	<link rel="icon" type="image/png" href="/rsc/road-map.png" />
	<link
		rel="stylesheet"
		href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
		crossorigin=""
	/>
	<link rel="stylesheet" href="./index.css" />
	<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
	<header class="top-bar" id="topBar">
		<div class="controls-left">
			<button id="btnBackward" class="control-btn" title="Backward 5 min" aria-label="Backward 5 minutes">&#9664;&#9664;</button>
			<button id="btnPlay" class="control-btn play" title="Play / Pause" aria-label="Play or pause animation">&#9654;</button>
			<button id="btnForward" class="control-btn" title="Forward 5 min" aria-label="Forward 5 minutes">&#9654;&#9654;</button>
		</div>

		<div class="timeline-wrap">
			<span id="labelMinTime" class="time-edge">-60 min</span>
			<input id="timeSlider" type="range" min="0" max="0" step="1" value="0" aria-label="Traffic timeline" />
			<span id="labelMaxTime" class="time-edge">+90 min</span>
		</div>

		<div class="time-readouts">
			<div class="readout">
				<span class="readout-label">Forcasing Time</span>
				<span id="currentPlayingTime" class="readout-value">--</span>
			</div>
			<div class="readout">
				<span class="readout-label">Current Time</span>
				<span id="realLifeTime" class="readout-value">--</span>
			</div>
		</div>
	</header>

	<main>
		<div id="map"></div>
		<div class="map-style-picker" id="mapStylePicker">
			<label for="mapStyleSelect" class="map-style-label">Map Style</label>
			<select id="mapStyleSelect" class="map-style-select" aria-label="Select map style">
				<option value="dark" selected>Dark</option>
				<option value="light">Light</option>
				<option value="voyager">Voyager</option>
				<option value="osm">OpenStreetMap</option>
			</select>
		</div>
		<div class="colorbar">
			<div class="colorbar-title">Speed (km/h)</div>
			<div class="colorbar-segments">
				<div class="colorbar-segment" style="background-color: #d01c1f;">
					<span class="colorbar-label">&lt; 20</span>
				</div>
				<div class="colorbar-segment" style="background-color: #ff8b00;">
					<span class="colorbar-label">20-35</span>
				</div>
				<div class="colorbar-segment" style="background-color: #f2cb05;">
					<span class="colorbar-label">35-50</span>
				</div>
				<div class="colorbar-segment" style="background-color: #55ba3a;">
					<span class="colorbar-label">50-70</span>
				</div>
				<div class="colorbar-segment" style="background-color: #0d8fe8;">
					<span class="colorbar-label">&gt; 70</span>
				</div>
			</div>
		</div>
	</main>

	<script
		src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
		crossorigin=""
	></script>
	<script src="./index.js"></script>
</body>
</html>
